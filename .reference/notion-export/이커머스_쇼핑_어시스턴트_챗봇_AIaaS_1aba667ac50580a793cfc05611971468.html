="width:14px;height:14px;display:block"/></span>협업부서</th><td><span class="selected-value select-value-color-yellow">BE</span><span class="selected-value select-value-color-purple">FE</span><span class="selected-value select-value-color-green">Product Design</span></td></tr><tr class="property-row property-row-select"><th><span class="icon property-icon"><img src="https://www.notion.so/icons/arrow-circle-down_gray.svg" style="width:14px;height:14px;display:block"/></span>회사명</th><td><span class="selected-value select-value-color-yellow">버즈니</span></td></tr></tbody></table></header><div class="page-body"><div style="display:contents" dir="ltr"><figure id="1aba667a-c505-80d1-b9e5-c37a86caa4e9" class="image"><a href="image%2016.png"><img style="width:711.3635864257812px" src="image%2016.png"/></a></figure></div><div style="display:contents" dir="ltr"><figure id="1aba667a-c505-8092-8532-e3d56a346a43" class="image"><a href="image%2017.png"><img style="width:4904px" src="image%2017.png"/></a></figure></div><div style="display:contents" dir="ltr"><figure class="block-color-gray_background callout" style="white-space:pre-wrap;display:flex" id="1aba667a-c505-80c0-b35f-d0e387a88b9e"><div style="font-size:1.5em"><span class="icon">🚧</span></div><div style="width:100%"><div style="display:contents" dir="auto"><p id="1aba667a-c505-8042-adda-c37f23aa070f" class="">문제: 기획 없이 기술베이스로 CTO 중심 추진 중이었던 과제, 입사 후 첫 프로젝트로 복잡하게 얽힌 개발 히스토리 속, 빠르게 SaaS 납품이 가능한 방안을 마련했어야 함.</p></div></div></figure></div><div style="display:contents" dir="ltr"><figure class="block-color-gray_background callout" style="white-space:pre-wrap;display:flex" id="1aba667a-c505-80e9-a4e7-e48e2e458619"><div style="font-size:1.5em"><span class="icon">💡</span></div><div style="width:100%"><div style="display:contents" dir="auto"><p id="1aba667a-c505-80c2-b69d-d9aebc52ba7a" class="">솔루션: 기능 범위 최소화 (참조대상 변화: 리뷰,날씨,상품,쇼호스트멘트,웹검색,편성정보 → 상품, 쇼호스트멘트, 리뷰)를 통한 챗봇 답변 퀄리티 제어. SDK스크립트 제작을 통한 B2B 납입 허들 경감.</p></div></div></figure></div><div style="display:contents" dir="ltr"><figure class="block-color-gray_background callout" style="white-space:pre-wrap;display:flex" id="1aba667a-c505-8021-9b0b-ddf839781b53"><div style="font-size:1.5em"><span class="icon">✅</span></div><div style="width:100%"><div style="display:contents" dir="auto"><p id="1aba667a-c505-80e6-a4da-d8737e6521d0" class="">성과: 고객사 2곳 납품(MRR 1,500만 원), ChatGPT 붐을 타고 수 많은 인바운드 문의를 창출함, 챗봇으로 인입된 문의를 실제 다른 제품의 도입사례로 발전시킨 케이스 다수. </p></div></div></figure></div><div style="display:contents" dir="auto"><details open=""><summary style="font-weight:600;font-size:1.875em;line-height:1.3;margin:0">하이라이트</summary><div class="indented"><div style="display:contents" dir="ltr"><figure class="block-color-gray_background callout" style="white-space:pre-wrap;display:flex" id="1aba667a-c505-802b-ab43-c987ea2ae67f"><div style="font-size:1.5em"><span class="icon">💡</span></div><div style="width:100%"><div style="display:contents" dir="auto"><p id="1aba667a-c505-8029-a1a1-d32a4c5fb266" class="">버즈니 조인 전 해당 챗봇의 기획은 ‘무엇이든 물어볼 수 있는’ 이커머스 챗봇 이었으나, LLM(당시는 GPT 3.5-turbo를 활용중이었음)의 hallucination이 온전히 제어할 수 없는 환경에서 너무 많은 참조대상은 B2B납품 시 서비스 신뢰성을 저해하는 요소라고 판단. 실제 기업고객과의 끊임없는 미팅을 통해 기능 범위를 최소화할 수 있었음.</p></div></div></figure></div><div style="display:contents" dir="ltr"><figure class="block-color-gray_background callout" style="white-space:pre-wrap;display:flex" id="1aba667a-c505-80d2-8a50-f954d21bd648"><div style="font-size:1.5em"><span class="icon">💡</span></div><div style="width:100%"><div style="display:contents" dir="auto"><p id="1aba667a-c505-8007-bdeb-c03e59cff779" class="">또한 최초 기획은 메인페이지에 붙어서 동작하는 챗봇의 기획이었지만, 실제 자사 플랫폼(홈쇼핑모아)적용 결과, 메인페이지의 retention이 현저히 떨어지는 것을 확인. 홈쇼핑 도메인 고객들의 user behavior에 최적화한 시나리오 신규로 수립, 자사 플랫폼에서 실험 후, 고객사로 배포.</p></div><div style="display:contents" dir="auto"><p id="1aba667a-c505-8019-894a-ff3441d9b165" class="">→ 상품상세 문의 챗봇, 홈쇼핑 방송영상 기반 질의응답</p></div></div></figure></div><div style="display:contents" dir="auto"><div id="1aba667a-c505-8090-a768-fabc35fbde3f" class="column-list"><div style="display:contents" dir="auto"><div id="1aba667a-c505-80ff-9d2a-de790d01813e" style="width:50%" class="column"><div style="display:contents" dir="ltr"><figure id="1aba667a-c505-80da-bca2-cf5fd4dcfcd7" class="image"><a href="image%2018.png"><img style="width:683.37353515625px" src="image%2018.png"/></a></figure></div><div style="display:contents" dir="auto"><p id="1aba667a-c505-803a-9efd-c78e6eb08e6d" class="">
</p></div></div></div><div style="display:contents" dir="auto"><div id="1aba667a-c505-8060-8abc-d8767982eea0" style="width:50%" class="column"><div style="display:contents" dir="ltr"><figure id="1aba667a-c505-80bc-94a7-ea99180bbfc4" class="image"><a href="image%2019.png"><img style="width:318.678955078125px" src="image%2019.png"/></a></figure></div></div></div></div></div><div style="display:contents" dir="ltr"><figure class="block-color-gray_background callout" style="white-space:pre-wrap;display:flex" id="1aba667a-c505-80ce-be14-d7205717f123"><div style="font-size:1.5em"><span class="icon">💡</span></div><div style="width:100%"><div style="display:contents" dir="auto"><p id="1aba667a-c505-8094-a2ac-ce01c1e4177b" class="">B2B연동을 위한 기획이 잡혀있지 않은 상태였기 때문에, 웹뷰 형태로만 납품가능했던 최초의 제품을 보다 확장가능한 프로덕트로 개선하기 위해 SDK스크립트 기반으로 납품가능하게 함.</p></div></div></figure></div><div style="display:contents" dir="ltr"><figure id="1aba667a-c505-8075-b551-db439e3ec707" class="image"><a href="image%2020.png"><img style="width:683.37353515625px" src="image%2020.png"/></a></figure></div></div></details></div><div style="display:contents" dir="auto"><p id="1aba667a-c505-809b-a302-d49289f16fb4" class="">
</p></div></div></article><span class="sans" style="font-size:14px;padding-top:2em"></span></body></html>
