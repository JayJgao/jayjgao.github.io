<svg xmlns="http://www.w3.org/2000/svg" width="1280" height="720" viewBox="0 0 1280 720">
  <rect width="1280" height="720" fill="#0b1220"/>
  <text x="640" y="90" fill="#e5e7eb" font-size="34" text-anchor="middle" font-family="sans-serif">Shortform Sequence</text>
  <g stroke="#64748b" stroke-width="2">
    <line x1="240" y1="140" x2="240" y2="650"/>
    <line x1="640" y1="140" x2="640" y2="650"/>
    <line x1="1040" y1="140" x2="1040" y2="650"/>
  </g>
  <g fill="#cbd5e1" font-family="sans-serif" font-size="24" text-anchor="middle">
