<svg xmlns="http://www.w3.org/2000/svg" width="1600" height="900" viewBox="0 0 1600 900" role="img" aria-labelledby="title desc">
  <title id="title">A2P Integration Schema</title>
  <desc id="desc">Product app routes unified requests to provider adapters through policy engine.</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0b1220"/>
      <stop offset="100%" stop-color="#121d33"/>
    </linearGradient>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="8" refY="5" orient="auto-start-reverse">
      <path d="M0,0 L10,5 L0,10 z" fill="#7dd3fc"/>
    </marker>
    <style>
      .card { fill: #0f1a2e; stroke: #2d4f7a; stroke-width: 2; rx: 18; }
      .provider { fill: #11253f; stroke: #2b5e8e; stroke-width: 2; rx: 14; }
      .title { fill: #e2e8f0; font: 600 36px Pretendard, sans-serif; }
      .label { fill: #d9e2f2; font: 600 24px Pretendard, sans-serif; }
      .small { fill: #9fb3d1; font: 500 19px Pretendard, sans-serif; }
      .edge { stroke: #7dd3fc; stroke-width: 3; fill: none; marker-end: url(#arrow); }
      .chip { fill: #10233e; stroke: #2c537f; stroke-width: 1.5; rx: 999; }
      .chip-text { fill: #9bd8ff; font: 600 18px Pretendard, sans-serif; }
    </style>
  </defs>

  <rect x="0" y="0" width="1600" height="900" fill="url(#bg)"/>
  <text x="100" y="88" class="title">A2P Integration Schema</text>
  <text x="100" y="126" class="small">Application-to-Provider routing for I2V, I2I, TTS, and Music Generation</text>

  <rect class="card" x="110" y="240" width="250" height="140"/>
  <text class="label" x="153" y="313">Product App</text>

  <rect class="card" x="470" y="220" width="300" height="180"/>
  <text class="label" x="535" y="294">A2P Gateway</text>
  <text class="small" x="516" y="332">Unified Request Contract</text>

  <rect class="card" x="900" y="220" width="290" height="180"/>
  <text class="label" x="946" y="294">Routing Policy</text>
  <text class="small" x="954" y="332">Latency / Cost / Quality</text>

  <rect class="provider" x="1270" y="120" width="220" height="110"/>
  <text class="label" x="1348" y="186">I2V</text>

  <rect class="provider" x="1270" y="265" width="220" height="110"/>
  <text class="label" x="1348" y="331">I2I</text>

  <rect class="provider" x="1270" y="410" width="220" height="110"/>
  <text class="label" x="1350" y="476">TTS</text>

  <rect class="provider" x="1270" y="555" width="220" height="110"/>
  <text class="label" x="1321" y="621">Music Gen</text>

  <path class="edge" d="M360 310 H470"/>
  <path class="edge" d="M770 310 H900"/>
  <path class="edge" d="M1190 280 H1270"/>
  <path class="edge" d="M1190 310 C1235 310 1235 320 1270 320"/>
  <path class="edge" d="M1190 340 C1235 340 1235 465 1270 465"/>
  <path class="edge" d="M1190 370 C1235 370 1235 610 1270 610"/>

  <path class="edge" d="M1270 186 C1220 186 1220 730 900 730"/>
  <path class="edge" d="M1270 331 C1190 331 1190 745 900 745"/>
  <path class="edge" d="M1270 476 C1210 476 1210 760 900 760"/>
  <path class="edge" d="M1270 621 C1220 621 1220 775 900 775"/>
  <path class="edge" d="M900 775 H360"/>

  <rect class="chip" x="480" y="470" width="215" height="48"/>
  <text class="chip-text" x="527" y="501">Provider Adapter</text>

  <rect class="chip" x="760" y="470" width="195" height="48"/>
  <text class="chip-text" x="804" y="501">Failover Rule</text>

  <rect class="chip" x="985" y="470" width="215" height="48"/>
  <text class="chip-text" x="1036" y="501">Version Policy</text>
</svg>
